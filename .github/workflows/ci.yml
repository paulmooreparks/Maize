name: CI

on:
  push:
    branches: [master, next]
  pull_request:
    branches: [master, next]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Build C toolchain (cproc + qbe + Maize target)
        run: scripts/build-toolchain.sh

      - name: Build and run tests
        run: scripts/run-tests.sh

      # maize-242: a Release-preset leg catches optimization-general regressions
      # (e.g. FP tie-rounding that only mis-rounds under -O2+/LTO) that the Debug
      # leg above cannot see. The defect this guards against sat undetected since
      # maize-237 because no CI leg built Release on either platform.
      - name: Build and run tests (Release)
        run: scripts/run-tests.sh --preset linux-release

      - name: C hello world end-to-end (cproc -> qbe -t maize -> mazm -> maize)
        run: scripts/run-ctest.sh --skip-build

  linux-sanitizers:
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: abort_on_error=1:detect_leaks=0
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Build C toolchain (cproc + qbe + Maize target)
        run: scripts/build-toolchain.sh

      - name: Build (ASan+UBSan) and run asm suite
        run: scripts/run-tests.sh --preset linux-asan-ubsan

      - name: C toolchain end-to-end under ASan+UBSan
        run: scripts/run-ctest.sh --preset linux-asan-ubsan --skip-build

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # maize-257: the C toolchain (cproc-qbe + qbe) now builds natively via Git
      # Bash (windows-latest ships it, `shell: bash`) + the vendored llvm-mingw
      # clang, so llvm-mingw must be bootstrapped BEFORE that build step (it used
      # to only gate the VM's own CMake build, further down). No MSYS2 setup at
      # all: the msys2/setup-msys2 action and its gcc/make/patch/diffutils install
      # are gone, replaced by the same native path a Windows operator runs.
      - name: Cache llvm-mingw toolchain
        uses: actions/cache@v4
        with:
          path: .toolchains/llvm-mingw
          key: llvm-mingw-${{ hashFiles('scripts/bootstrap-toolchain.ps1') }}

      - name: Bootstrap llvm-mingw toolchain
        run: scripts/bootstrap-toolchain.ps1

      - name: Build C toolchain (cproc + qbe + Maize target, native)
        shell: bash
        run: scripts/build-toolchain.sh

      - name: Ensure ninja is available
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          }

      - name: Build and run tests
        run: scripts/run-tests.ps1

      # maize-242: Release-preset leg on the llvm-mingw (clang) toolchain. The
      # RMM tie-rounding defect reproduced on BOTH clang and gcc Release builds,
      # so the guard is needed on both platforms, not just one.
      - name: Build and run tests (Release)
        run: scripts/run-tests.ps1 -Preset windows-llvm-mingw-release

      - name: C hello world end-to-end (cproc -> qbe -t maize -> mazm -> maize)
        shell: bash
        run: scripts/run-ctest.sh --preset windows-llvm-mingw-debug --skip-build
