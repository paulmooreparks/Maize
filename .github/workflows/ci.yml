name: CI

on:
  # maize-318: CI moved off the per-push trigger (every card merge no longer
  # fires a ~27-minute three-job run) to a nightly batch plus an on-demand
  # trigger. workflow_dispatch now covers the on-demand role the old
  # merge-check/** push trigger (maize-257) served, so that trigger is
  # removed rather than kept alongside it. Maize is trunk-based (commits go
  # straight to master), so there is no pull_request trigger to reconcile.
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Build C toolchain (cproc + qbe + Maize target)
        run: scripts/build-toolchain.sh

      - name: Build and run tests
        run: scripts/run-tests.sh

      # maize-242: a Release-preset leg catches optimization-general regressions
      # (e.g. FP tie-rounding that only mis-rounds under -O2+/LTO) that the Debug
      # leg above cannot see. The defect this guards against sat undetected since
      # maize-237 because no CI leg built Release on either platform.
      - name: Build and run tests (Release)
        run: scripts/run-tests.sh --preset linux-release

      - name: C hello world end-to-end (cproc -> qbe -t maize -> mazm -> maize)
        # maize-314: point the ctest suite at the compiled mzcc (built above by
        # run-tests.sh's untargeted `cmake --build`, which already covers every
        # target in the linux-debug preset) instead of the cc-maize.sh shell
        # driver, so the suite inherits the maize-302 runtime archive and the
        # maize-274 object cache.
        env:
          MAIZE_CC: ${{ github.workspace }}/build/linux-debug/mzcc
        run: scripts/run-ctest.sh --skip-build

  linux-sanitizers:
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: abort_on_error=1:detect_leaks=0
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Build C toolchain (cproc + qbe + Maize target)
        run: scripts/build-toolchain.sh

      - name: Build (ASan+UBSan) and run asm suite
        run: scripts/run-tests.sh --preset linux-asan-ubsan

      - name: C toolchain end-to-end under ASan+UBSan
        # maize-314: same flip as the plain linux job, keyed off this job's
        # own instrumented preset/build dir so the ctest suite runs through
        # the sanitizer-built mzcc, not cc-maize.sh.
        env:
          MAIZE_CC: ${{ github.workspace }}/build/linux-asan-ubsan/mzcc
        run: scripts/run-ctest.sh --preset linux-asan-ubsan --skip-build

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # maize-257: the C toolchain (cproc-qbe + qbe) now builds natively via Git
      # Bash (windows-latest ships it, `shell: bash`) + the vendored llvm-mingw
      # clang, so llvm-mingw must be bootstrapped BEFORE that build step (it used
      # to only gate the VM's own CMake build, further down). No MSYS2 setup at
      # all: the msys2/setup-msys2 action and its gcc/make/patch/diffutils install
      # are gone, replaced by the same native path a Windows operator runs.
      - name: Cache llvm-mingw toolchain
        uses: actions/cache@v4
        with:
          path: .toolchains/llvm-mingw
          key: llvm-mingw-${{ hashFiles('scripts/bootstrap-toolchain.ps1') }}

      - name: Bootstrap llvm-mingw toolchain
        run: scripts/bootstrap-toolchain.ps1

      - name: Build C toolchain (cproc + qbe + Maize target, native)
        shell: bash
        run: scripts/build-toolchain.sh

      - name: Ensure ninja is available
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          }

      - name: Build and run tests
        run: scripts/run-tests.ps1

      # maize-242: Release-preset leg on the llvm-mingw (clang) toolchain. The
      # RMM tie-rounding defect reproduced on BOTH clang and gcc Release builds,
      # so the guard is needed on both platforms, not just one.
      - name: Build and run tests (Release)
        run: scripts/run-tests.ps1 -Preset windows-llvm-mingw-release

      - name: C hello world end-to-end (cproc -> qbe -t maize -> mazm -> maize)
        # maize-314: same flip, Windows leg. run-tests.ps1 above already built
        # mzcc.exe into this preset's build dir (its cmake --build is also
        # untargeted, so mzcc rides along with maize/mazm/mzld/maizeg/mzdis).
        # MAIZE_CC is computed with bash's own $(pwd) rather than a github.workspace
        # env: value: github.workspace resolves with native backslash separators on
        # windows-latest, and there is no expression-language replace() to normalize
        # them, whereas bash's pwd gives the same forward-slash absolute form
        # run-ctest.sh's own REPO_ROOT/BUILD_DIR resolution already uses.
        shell: bash
        run: |
          export MAIZE_CC="$(pwd)/build/windows-llvm-mingw-debug/mzcc.exe"
          scripts/run-ctest.sh --preset windows-llvm-mingw-debug --skip-build
