# Build the Maize ISA specification with mdBook and publish it to GitHub
# Pages using the native GitHub Pages Actions deployment (Pages Source =
# GitHub Actions, set by the operator in repo Settings -> Pages).
#
# docs/spec/ is the single source of truth: mdBook reads the chapters
# directly (book.toml src = "docs/spec"), so the published book IS the
# spec with zero drift. This card adds only the build/publish plumbing;
# it does not touch chapter content.

name: Docs

on:
  push:
    branches:
      - master
    paths:
      - "docs/spec/**"
      - "book.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=v0.4.40
          mkdir -p "$HOME/.cargo/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C "$HOME/.cargo/bin"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build book
        run: mdbook build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
